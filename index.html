<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUTA HUB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0d0e15;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            gap: 20px;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .title {
            color: #ffffff;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-copy {
            background: linear-gradient(135deg, #007aff, #a855f7);
            color: #ffffff;
            border: none;
            padding: 16px 36px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 122, 255, 0.3);
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }
        .btn-copy:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(168, 85, 247, 0.4);
        }
        .btn-copy:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <!-- Nama script di atas tombol -->
    <h1 class="title">YUTA HUB</h1>

    <!-- Kotak tombol bertuliskan copy script -->
    <button class="btn-copy" id="copyBtn" onclick="copyScript()">COPY SCRIPT</button>

    <script>
        function copyScript() {
            var scriptCode = 'loadstring(game:HttpGet("https://raw.githubusercontent.com/trompetnohbhb-maker/isnide/refs/heads/main/sad"))()';
            
            navigator.clipboard.writeText(scriptCode);
            
            var button = document.getElementById("copyBtn");
            button.innerText = "COPIED! ✓";
            button.style.background = "#10b981";
            button.style.boxShadow = "0 4px 20px rgba(16, 185, 129, 0.4)";
            
            setTimeout(function() {
                button.innerText = "COPY SCRIPT";
                button.style.background = "linear-gradient(135deg, #007aff, #a855f7)";
                button.style.boxShadow = "0 4px 20px rgba(0, 122, 255, 0.3)";
            }, 2000);
        }
    </script>

</body>
</html>
